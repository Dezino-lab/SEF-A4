name: SEF4
run-name: Running tests on github actions
on: [push]
jobs:
    java-test:
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository code
              uses: actions/checkout@v4
            - name: Setup java
              uses: actions/setup-java@v4
              with:
                distribution: 'temurin'
                java-version: '17'
            - name: Run tests
              working-directory: ./sef-a4
              run: mvn test
    